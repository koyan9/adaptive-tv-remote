name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tv-remote-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [17, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Prepare wrapper
        run: chmod +x mvnw

      - name: Run tests
        id: unit_tests
        run: ./mvnw -B -q test -Djunit.jupiter.exclude.tags=mock-integration

      - name: Publish JUnit report
        if: failure()
        uses: dorny/test-reporter@v1
        with:
          name: unit-tests (JUnit)
          path: target/surefire-reports/*.xml
          reporter: java-junit
          only-summary: true
          list-tests: failed
          fail-on-error: false

  mock-integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: [17, 21]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Prepare wrapper
        run: chmod +x mvnw

      - name: List mock integration tests
        run: rg -n "@Tag\\(\"mock-integration\"\\)" src/test/java

      - name: Mock integration summary
        run: |
          echo "## Mock Integration Tests" >> $GITHUB_STEP_SUMMARY
          rg -n "@Tag\\(\"mock-integration\"\\)" src/test/java >> $GITHUB_STEP_SUMMARY

      - name: Run mock integration tests
        id: mock_integration_tests
        run: ./mvnw -B -q test -Djunit.jupiter.tags=mock-integration

      - name: Publish JUnit report
        if: failure()
        uses: dorny/test-reporter@v1
        with:
          name: mock-integration (JUnit)
          path: target/surefire-reports/*.xml
          reporter: java-junit
          only-summary: true
          list-tests: failed
          fail-on-error: false

      - name: Publish mock integration summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Mock Integration Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -d target/surefire-reports ]; then
            rg -n "Tests run:" target/surefire-reports >> $GITHUB_STEP_SUMMARY
          else
            echo "No surefire reports found." >> $GITHUB_STEP_SUMMARY
          fi



