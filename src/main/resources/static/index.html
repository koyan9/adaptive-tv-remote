<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0b0f14">
    <title>Adaptive TV Remote</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="shell">
    <header class="hero">
        <div>
            <p class="eyebrow">Household Remote Mesh</p>
            <h1>One phone.<br>Every screen.</h1>
        </div>
        <button class="scan-button" id="scanButton" type="button">Scan home</button>
    </header>

    <main class="layout">
        <section class="panel panel-devices">
            <div class="panel-heading">
                <h2>Rooms</h2>
                <span id="networkBadge" class="badge muted">Waiting for scan</span>
            </div>
            <div id="deviceList" class="device-list"></div>
        </section>

        <section class="panel panel-remote">
            <div class="panel-heading remote-heading">
                <div>
                    <h2 id="deviceName">Select a TV</h2>
                    <p id="deviceMeta" class="muted">The app will choose the best available route automatically.</p>
                </div>
                <div id="routeBadge" class="badge accent">Idle</div>
            </div>

            <div class="status-grid">
                <article class="status-card">
                    <span>Room</span>
                    <strong id="roomValue">â€?/strong>
                </article>
                <article class="status-card">
                    <span>Brand</span>
                    <strong id="brandValue">â€?/strong>
                </article>
                <article class="status-card">
                    <span>Paths</span>
                    <strong id="pathsValue">â€?/strong>
                </article>
            </div>

            <section class="remote-grid">
                <button class="command command-power" data-command="POWER_TOGGLE" type="button">Power</button>
                <button class="command command-aux" data-command="HOME" type="button">Home</button>
                <button class="command command-aux" data-command="BACK" type="button">Back</button>
                <button class="command command-aux" data-command="INPUT_SOURCE" type="button">Source</button>

                <button class="command command-volume" data-command="VOLUME_UP" type="button">Vol +</button>
                <div class="dpad-frame">
                    <button class="command dpad up" data-command="DPAD_UP" type="button">â–?/button>
                    <button class="command dpad left" data-command="DPAD_LEFT" type="button">â—€</button>
                    <button class="command dpad center" data-command="OK" type="button">OK</button>
                    <button class="command dpad right" data-command="DPAD_RIGHT" type="button">â–?/button>
                    <button class="command dpad down" data-command="DPAD_DOWN" type="button">â–?/button>
                </div>
                <button class="command command-volume" data-command="VOLUME_DOWN" type="button">Vol âˆ?/button>

                <button class="command command-channel" data-command="CHANNEL_UP" type="button">Ch +</button>
                <button class="command command-aux" data-command="MUTE" type="button">Mute</button>
                <button class="command command-channel" data-command="CHANNEL_DOWN" type="button">Ch âˆ?/button>
            </section>

            <div class="capability-row">
                <span class="muted">Supported commands</span>
                <div id="capabilities" class="capability-chips"></div>
            </div>
        </section>

        <section class="panel panel-log">
            <div class="panel-heading">
                <h2>Activity</h2>
                <span class="badge muted">Recent executions</span>
            </div>
            <div id="activityLog" class="activity-log"></div>
        </section>
    </main>
</div>

<template id="deviceCardTemplate">
    <button class="device-card" type="button">
        <span class="device-room"></span>
        <strong class="device-name"></strong>
        <span class="device-model muted"></span>
        <span class="device-state"></span>
    </button>
</template>

<template id="logItemTemplate">
    <article class="log-item">
        <div class="log-main">
            <strong class="log-command"></strong>
            <span class="log-device muted"></span>
        </div>
        <div class="log-meta">
            <span class="log-route badge"></span>
            <time class="log-time muted"></time>
        </div>
        <p class="log-message muted"></p>
    </article>
</template>

<script src="/app.js" defer></script>
</body>
</html>
